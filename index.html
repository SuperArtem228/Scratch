<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Золотой скретч-билет</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@600;700;800;900&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Nunito', sans-serif;
    background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    color: #fff;
    -webkit-user-select: none;
    user-select: none;
  }

  .container {
    width: 100%;
    max-width: 480px;
    padding: 16px;
    text-align: center;
    position: relative;
  }

  /* ---- HEADER ---- */
  .header { margin-bottom: 18px; transition: opacity 0.4s; }
  .header h1 {
    font-size: 24px;
    font-weight: 900;
    background: linear-gradient(90deg, #ffd700, #ffec80, #ffd700);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    margin-bottom: 4px;
  }
  .header p {
    font-size: 13px;
    color: rgba(255,255,255,0.6);
    font-weight: 600;
  }

  /* ---- PROGRESS ---- */
  .progress {
    display: flex;
    justify-content: center;
    gap: 12px;
    margin-bottom: 18px;
  }
  .progress-dot {
    width: 38px;
    height: 38px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 15px;
    font-weight: 800;
    transition: all 0.4s ease;
    border: 3px solid rgba(255,215,0,0.3);
    color: rgba(255,255,255,0.4);
    background: rgba(255,255,255,0.05);
  }
  .progress-dot.active {
    border-color: #ffd700;
    color: #ffd700;
    background: rgba(255,215,0,0.15);
    box-shadow: 0 0 20px rgba(255,215,0,0.3);
    transform: scale(1.15);
  }
  .progress-dot.done {
    border-color: rgba(255,215,0,0.5);
    color: rgba(255,215,0,0.5);
    background: rgba(255,215,0,0.1);
  }

  /* ---- TICKET LABEL ---- */
  .ticket-label {
    font-size: 13px;
    color: rgba(255,255,255,0.5);
    font-weight: 700;
    margin-bottom: 10px;
    min-height: 20px;
    transition: opacity 0.3s;
  }

  /* ---- TICKET WRAPPER ---- */
  .ticket-wrapper {
    position: relative;
    margin: 0 auto 14px;
    /* aspect ratio 515:293 */
    width: 84%;
    max-width: 515px;
    min-width: 300px;
  }
  .ticket-wrapper::before {
    content: '';
    display: block;
    padding-top: 56.89%; /* 293/515 * 100 */
  }

  .ticket {
    position: absolute;
    inset: 0;
    transition: transform 0.5s ease, opacity 0.5s ease;
  }
  .ticket.entering {
    transform: translateX(60px) scale(0.95);
    opacity: 0;
  }
  .ticket.exiting {
    transform: translateX(-60px) scale(0.95);
    opacity: 0;
  }

  /* Main ticket frame background */
  .ticket-frame {
    position: absolute;
    inset: 0;
    background-image: url('flagman_scratch_ticket_assets_pack/ticket_main_frame_3x3.png');
    background-size: 100% 100%;
    background-repeat: no-repeat;
    filter: drop-shadow(0 6px 24px rgba(255,215,0,0.25));
  }

  /* Golden Ticket label on left stub */
  .ticket-stub-label {
    position: absolute;
    left: 0;
    top: 50%;
    transform: translateY(-50%) rotate(-90deg);
    transform-origin: center center;
    font-size: 9px;
    font-weight: 900;
    color: rgba(180,130,20,0.7);
    letter-spacing: 2px;
    text-transform: uppercase;
    white-space: nowrap;
    pointer-events: none;
    width: 80px;
    text-align: center;
    left: -14px;
  }

  /* ---- 3x3 GRID ---- */
  .cell-grid {
    position: absolute;
    /* Measured from ticket_grid_guide.png: compact grid within gold frame */
    left: 20.4%;
    top: 11.6%;
    width: 60.2%;
    height: 76.8%;
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    grid-template-rows: repeat(3, 1fr);
    gap: 1.8%;
  }

  /* ---- INDIVIDUAL CELL ---- */
  .cell {
    position: relative;
    border-radius: 10%;
    overflow: hidden;
    cursor: pointer;
    touch-action: none;
  }

  /* Cell background layers */
  .cell-bg {
    position: absolute;
    inset: 0;
    background-size: 100% 100%;
    background-repeat: no-repeat;
    transition: opacity 0.3s ease;
  }
  .cell-bg-idle {
    background-image: url('flagman_scratch_ticket_assets_pack/ticket_cell_idle_gold.png');
  }
  .cell-bg-active {
    background-image: url('flagman_scratch_ticket_assets_pack/ticket_cell_active_gold.png');
    opacity: 0;
  }
  .cell-bg-revealed {
    background-image: url('flagman_scratch_ticket_assets_pack/ticket_cell_revealed_gold.png');
    opacity: 0;
  }

  /* Reward image inside cell (hidden until reveal) */
  .cell-reward {
    position: absolute;
    /* contentSafe: fit reward badges snugly inside cell */
    left: 50%;
    top: 50%;
    width: 70%;
    height: 70%;
    transform: translate(-50%, -50%);
    background-size: contain;
    background-repeat: no-repeat;
    background-position: center;
    opacity: 0;
    transition: opacity 0.3s ease 0.1s;
    pointer-events: none;
    z-index: 2;
  }

  /* Scratch overlay canvas per cell */
  .cell-scratch {
    position: absolute;
    inset: 0;
    z-index: 5;
    border-radius: 10%;
    touch-action: none;
  }

  /* Cell states */
  .cell.state-revealed .cell-bg-idle { opacity: 0; }
  .cell.state-revealed .cell-bg-revealed { opacity: 1; }
  .cell.state-revealed .cell-reward { opacity: 1; }
  .cell.state-revealed .cell-scratch { display: none; }

  .cell.state-active .cell-bg-active { opacity: 1; }

  /* ---- HINT ---- */
  .hint {
    font-size: 13px;
    color: rgba(255,255,255,0.4);
    margin-top: 10px;
    min-height: 20px;
    transition: opacity 0.3s;
  }

  /* ---- ATTEMPT RESULT OVERLAY ---- */
  .attempt-result {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.5s ease;
    z-index: 10;
    background: rgba(0,0,0,0.5);
    border-radius: 12px;
  }
  .attempt-result.visible { opacity: 1; }
  .attempt-result-img {
    max-width: 60%;
    max-height: 40%;
    margin-bottom: 8px;
    filter: drop-shadow(0 4px 12px rgba(255,215,0,0.5));
  }
  .attempt-result-text {
    font-size: 16px;
    font-weight: 800;
    color: #ffd700;
    text-shadow: 0 2px 8px rgba(0,0,0,0.5);
  }
  .attempt-result-sub {
    font-size: 12px;
    font-weight: 700;
    color: rgba(255,255,255,0.7);
    margin-top: 4px;
  }

  /* ---- FINAL SCREEN ---- */
  .final-screen {
    position: fixed;
    inset: 0;
    background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 100;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.6s ease;
  }
  .final-screen.visible {
    opacity: 1;
    pointer-events: all;
  }
  .final-content {
    text-align: center;
    padding: 40px 20px;
    transform: translateY(30px);
    transition: transform 0.6s ease;
  }
  .final-screen.visible .final-content {
    transform: translateY(0);
  }
  .final-content .congrats {
    font-size: 28px;
    font-weight: 900;
    color: #ffd700;
    margin-bottom: 8px;
  }
  .final-content .your-win {
    font-size: 16px;
    color: rgba(255,255,255,0.6);
    font-weight: 700;
    margin-bottom: 20px;
  }
  .final-reward-img {
    max-width: 280px;
    width: 70%;
    margin-bottom: 12px;
    filter: drop-shadow(0 4px 20px rgba(255,215,0,0.5));
  }
  .final-content .deposit-text {
    font-size: 16px;
    font-weight: 800;
    color: rgba(255,255,255,0.7);
    letter-spacing: 2px;
    margin-bottom: 32px;
  }
  .cta-btn {
    display: inline-block;
    padding: 18px 60px;
    background: linear-gradient(135deg, #ffd700, #ffb300);
    color: #1a1a2e;
    font-family: 'Nunito', sans-serif;
    font-size: 18px;
    font-weight: 900;
    border: none;
    border-radius: 50px;
    cursor: pointer;
    text-transform: uppercase;
    letter-spacing: 2px;
    box-shadow: 0 4px 20px rgba(255,215,0,0.4), 0 0 40px rgba(255,215,0,0.2);
    transition: transform 0.2s, box-shadow 0.2s;
  }
  .cta-btn:hover {
    transform: scale(1.05);
    box-shadow: 0 6px 30px rgba(255,215,0,0.5), 0 0 60px rgba(255,215,0,0.3);
  }
  .cta-btn:active { transform: scale(0.98); }

  /* ---- CONFETTI ---- */
  .confetti-container {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 101;
    overflow: hidden;
  }
  .confetti-piece {
    position: absolute;
    width: 10px;
    height: 10px;
    top: -20px;
    opacity: 0;
  }

  /* ---- SPARKLE ---- */
  .sparkle {
    position: absolute;
    width: 6px;
    height: 6px;
    background: #ffd700;
    border-radius: 50%;
    pointer-events: none;
    opacity: 0;
    animation: sparkle-float 1.2s ease-out forwards;
    z-index: 20;
  }
  @keyframes sparkle-float {
    0% { opacity: 1; transform: translateY(0) scale(1); }
    100% { opacity: 0; transform: translateY(-30px) scale(0); }
  }

  /* ---- INTRO OVERLAY ---- */
  .intro-overlay {
    position: fixed;
    inset: 0;
    background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 200;
    transition: opacity 0.6s ease;
  }
  .intro-overlay.hidden { opacity: 0; pointer-events: none; }
  .intro-content { text-align: center; padding: 20px; }
  .intro-content .gift-icon {
    font-size: 72px;
    margin-bottom: 20px;
    animation: intro-bounce 1s ease infinite alternate;
  }
  @keyframes intro-bounce {
    0% { transform: translateY(0) scale(1); }
    100% { transform: translateY(-10px) scale(1.05); }
  }
  .intro-content h2 {
    font-size: 24px;
    font-weight: 900;
    color: #ffd700;
    margin-bottom: 10px;
  }
  .intro-content p {
    font-size: 15px;
    color: rgba(255,255,255,0.6);
    margin-bottom: 28px;
    line-height: 1.5;
    font-weight: 600;
  }
  .intro-btn {
    display: inline-block;
    padding: 16px 48px;
    background: linear-gradient(135deg, #ffd700, #ffb300);
    color: #1a1a2e;
    font-family: 'Nunito', sans-serif;
    font-size: 16px;
    font-weight: 900;
    border: none;
    border-radius: 50px;
    cursor: pointer;
    text-transform: uppercase;
    letter-spacing: 1px;
    box-shadow: 0 4px 20px rgba(255,215,0,0.4);
    transition: transform 0.2s;
  }
  .intro-btn:hover { transform: scale(1.05); }
  .intro-btn:active { transform: scale(0.98); }
</style>
</head>
<body>

<!-- INTRO -->
<div class="intro-overlay" id="intro">
  <div class="intro-content">
    <div class="gift-icon">🎁</div>
    <h2>Специальный подарок!</h2>
    <p>У вас есть 3 попытки открыть<br>золотой скретч-билет</p>
    <button class="intro-btn" id="startBtn">НАЧАТЬ</button>
  </div>
</div>

<!-- MAIN -->
<div class="container" id="mainContainer" style="opacity:0">
  <div class="header">
    <h1 id="headline">У вас 3 попытки</h1>
    <p id="subtitle">Сотрите блоки и откройте награду</p>
  </div>

  <div class="progress" id="progress">
    <div class="progress-dot active" data-idx="0">1</div>
    <div class="progress-dot" data-idx="1">2</div>
    <div class="progress-dot" data-idx="2">3</div>
  </div>

  <div class="ticket-label" id="ticketLabel">Попытка 1 из 3</div>

  <div class="ticket-wrapper" id="ticketWrapper">
    <div class="ticket" id="ticket">
      <div class="ticket-frame">
        <div class="ticket-stub-label">GOLDEN TICKET</div>
      </div>
      <div class="cell-grid" id="cellGrid"></div>
      <!-- Attempt result overlay on ticket -->
      <div class="attempt-result" id="attemptResult">
        <img class="attempt-result-img" id="attemptResultImg" src="" alt="">
        <div class="attempt-result-text" id="attemptResultText"></div>
        <div class="attempt-result-sub" id="attemptResultSub"></div>
      </div>
    </div>
  </div>

  <div class="hint" id="hint">👆 Сотрите ячейки на билете</div>
</div>

<!-- FINAL -->
<div class="final-screen" id="finalScreen">
  <div class="final-content">
    <div class="congrats">Поздравляем! 🎉</div>
    <div class="your-win">Твой выигрыш</div>
    <img class="final-reward-img" src="flagman_scratch_ticket_assets_pack/reward_up_to_500fs_gold.png" alt="До 500 FS">
    <div class="deposit-text">БЕСПЛАТНЫЕ ВРАЩЕНИЯ</div>
    <button class="cta-btn" id="ctaBtn">РЕГИСТРАЦИЯ</button>
  </div>
</div>

<div class="confetti-container" id="confettiContainer"></div>

<script>
(function() {
  'use strict';

  // =============================================
  // ASSETS
  // =============================================
  const ASSET = {
    cellIdle:     'flagman_scratch_ticket_assets_pack/ticket_cell_idle_gold.png',
    cellActive:   'flagman_scratch_ticket_assets_pack/ticket_cell_active_gold.png',
    cellRevealed: 'flagman_scratch_ticket_assets_pack/ticket_cell_revealed_gold.png',
    scratchMetal: 'flagman_scratch_ticket_assets_pack/ticket_scratch_overlay_metal.png',
    reward5fs:    'flagman_scratch_ticket_assets_pack/reward_5fs_gold.png',
    reward500fs:  'flagman_scratch_ticket_assets_pack/reward_up_to_500fs_gold.png',
  };

  // =============================================
  // REWARD LOGIC (separate from visuals)
  // =============================================
  // Each attempt has a 3x3 grid. Cells with reward=true show the reward badge.
  // Positions of reward cells per attempt (indices 0-8, row-major).
  // 3 reward cells form the "winning line" the user discovers.
  const ATTEMPTS = [
    {
      rewardImg: ASSET.reward5fs,
      rewardCells: [0, 4, 8], // diagonal
      resultText: '5 Free Spins!',
      resultSub: 'У вас осталось 2 попытки',
      isFinal: false,
    },
    {
      rewardImg: ASSET.reward5fs,
      rewardCells: [1, 4, 7], // vertical middle
      resultText: '5 Free Spins!',
      resultSub: 'Последняя попытка',
      isFinal: false,
    },
    {
      rewardImg: ASSET.reward500fs,
      rewardCells: [0, 1, 2, 3, 4, 5, 6, 7, 8], // all cells are reward
      resultText: 'До 500 Free Spins!',
      resultSub: '',
      isFinal: true,
    },
  ];

  // =============================================
  // CONFIG
  // =============================================
  const CELL_SCRATCH_THRESHOLD = 0.50;
  const CELLS_TO_AUTO_REVEAL = 3;   // after N reward cells revealed, auto-complete
  const REVEAL_HOLD_MS = 2000;
  const TRANSITION_MS = 500;

  // =============================================
  // STATE
  // =============================================
  let currentAttempt = 0;
  let state = 'preload';
  let cellStates = [];     // per cell: 'idle' | 'scratching' | 'revealed'
  let cellCanvases = [];   // per cell canvas refs
  let cellCtxs = [];       // per cell 2d contexts
  let revealedRewardCount = 0;
  let ticketRevealed = false;
  let scratchOverlayImg = null;

  // =============================================
  // ELEMENTS
  // =============================================
  const intro = document.getElementById('intro');
  const startBtn = document.getElementById('startBtn');
  const mainContainer = document.getElementById('mainContainer');
  const progressEl = document.getElementById('progress');
  const ticketLabel = document.getElementById('ticketLabel');
  const ticketWrapper = document.getElementById('ticketWrapper');
  const ticket = document.getElementById('ticket');
  const cellGrid = document.getElementById('cellGrid');
  const attemptResult = document.getElementById('attemptResult');
  const attemptResultImg = document.getElementById('attemptResultImg');
  const attemptResultText = document.getElementById('attemptResultText');
  const attemptResultSub = document.getElementById('attemptResultSub');
  const hint = document.getElementById('hint');
  const finalScreen = document.getElementById('finalScreen');
  const confettiContainer = document.getElementById('confettiContainer');

  // =============================================
  // PRELOAD
  // =============================================
  function preloadAssets(cb) {
    const urls = Object.values(ASSET);
    let loaded = 0;
    urls.forEach(url => {
      const img = new Image();
      img.onload = img.onerror = () => { loaded++; if (loaded >= urls.length) cb(); };
      img.src = url;
    });
    // Cache scratch overlay for canvas drawing
    scratchOverlayImg = new Image();
    scratchOverlayImg.src = ASSET.scratchMetal;
  }

  // =============================================
  // INIT
  // =============================================
  function init() {
    state = 'preload';
    preloadAssets(() => {
      state = 'intro';
      startBtn.addEventListener('click', onStart);
    });
  }

  function onStart() {
    state = 'ready_attempt_1';
    intro.classList.add('hidden');
    setTimeout(() => {
      mainContainer.style.opacity = '1';
      mainContainer.style.transition = 'opacity 0.5s ease';
      setupAttempt(0);
    }, 300);
  }

  // =============================================
  // SETUP ATTEMPT
  // =============================================
  function setupAttempt(idx) {
    currentAttempt = idx;
    ticketRevealed = false;
    revealedRewardCount = 0;
    cellStates = Array(9).fill('idle');
    cellCanvases = [];
    cellCtxs = [];
    state = `ready_attempt_${idx + 1}`;

    // Update progress
    const dots = progressEl.querySelectorAll('.progress-dot');
    dots.forEach((dot, i) => {
      dot.classList.remove('active', 'done');
      if (i < idx) dot.classList.add('done');
      if (i === idx) dot.classList.add('active');
    });

    ticketLabel.textContent = `Попытка ${idx + 1} из 3`;
    hint.textContent = '👆 Сотрите ячейки на билете';
    hint.style.opacity = '1';

    // Hide result overlay
    attemptResult.classList.remove('visible');

    // Animate ticket in
    ticket.classList.remove('exiting');
    ticket.classList.add('entering');
    requestAnimationFrame(() => {
      requestAnimationFrame(() => {
        ticket.classList.remove('entering');
      });
    });

    // Build grid
    buildGrid(idx);
  }

  // =============================================
  // BUILD 3x3 GRID
  // =============================================
  function buildGrid(attemptIdx) {
    cellGrid.innerHTML = '';
    const attempt = ATTEMPTS[attemptIdx];

    for (let i = 0; i < 9; i++) {
      const cell = document.createElement('div');
      cell.className = 'cell';
      cell.dataset.idx = i;

      // Background layers
      const bgIdle = document.createElement('div');
      bgIdle.className = 'cell-bg cell-bg-idle';
      cell.appendChild(bgIdle);

      const bgActive = document.createElement('div');
      bgActive.className = 'cell-bg cell-bg-active';
      cell.appendChild(bgActive);

      const bgRevealed = document.createElement('div');
      bgRevealed.className = 'cell-bg cell-bg-revealed';
      cell.appendChild(bgRevealed);

      // Reward image (visible only after reveal)
      const isReward = attempt.rewardCells.includes(i);
      if (isReward) {
        const rewardEl = document.createElement('div');
        rewardEl.className = 'cell-reward';
        rewardEl.style.backgroundImage = `url('${attempt.rewardImg}')`;
        cell.appendChild(rewardEl);
      }

      // Scratch canvas overlay
      const canvas = document.createElement('canvas');
      canvas.className = 'cell-scratch';
      cell.appendChild(canvas);

      cellGrid.appendChild(cell);

      // Setup canvas after DOM insertion
      requestAnimationFrame(() => setupCellCanvas(cell, canvas, i));
    }
  }

  // =============================================
  // CELL CANVAS SETUP
  // =============================================
  function setupCellCanvas(cell, canvas, idx) {
    const rect = cell.getBoundingClientRect();
    const dpr = window.devicePixelRatio || 1;
    canvas.width = rect.width * dpr;
    canvas.height = rect.height * dpr;
    canvas.style.width = rect.width + 'px';
    canvas.style.height = rect.height + 'px';

    const ctx = canvas.getContext('2d', { willReadFrequently: true });
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);

    // Draw scratch overlay image
    if (scratchOverlayImg.complete) {
      ctx.drawImage(scratchOverlayImg, 0, 0, rect.width, rect.height);
    } else {
      scratchOverlayImg.onload = () => {
        ctx.drawImage(scratchOverlayImg, 0, 0, rect.width, rect.height);
      };
    }

    cellCanvases[idx] = canvas;
    cellCtxs[idx] = ctx;

    // Pointer events
    let isDown = false;
    canvas.addEventListener('pointerdown', (e) => {
      if (ticketRevealed || cellStates[idx] === 'revealed') return;
      e.preventDefault();
      canvas.setPointerCapture(e.pointerId);
      isDown = true;
      cellStates[idx] = 'scratching';
      state = `scratching_${currentAttempt + 1}`;
      hint.style.opacity = '0';
      scratchCell(idx, e);
    });
    canvas.addEventListener('pointermove', (e) => {
      if (!isDown || ticketRevealed || cellStates[idx] === 'revealed') return;
      e.preventDefault();
      scratchCell(idx, e);
    });
    canvas.addEventListener('pointerup', () => { isDown = false; });
    canvas.addEventListener('pointerleave', () => { isDown = false; });
  }

  // =============================================
  // SCRATCH INDIVIDUAL CELL
  // =============================================
  function scratchCell(idx, e) {
    const canvas = cellCanvases[idx];
    const ctx = cellCtxs[idx];
    if (!canvas || !ctx) return;

    const rect = canvas.getBoundingClientRect();
    const x = e.clientX - rect.left;
    const y = e.clientY - rect.top;
    const radius = Math.max(rect.width, rect.height) * 0.22;

    ctx.globalCompositeOperation = 'destination-out';
    ctx.beginPath();
    ctx.arc(x, y, radius, 0, Math.PI * 2);
    ctx.fill();
    ctx.globalCompositeOperation = 'source-over';

    // Sparkle
    if (Math.random() > 0.7) {
      spawnSparkle(e.clientX, e.clientY);
    }

    checkCellProgress(idx);
  }

  // =============================================
  // CHECK CELL SCRATCH PROGRESS
  // =============================================
  function checkCellProgress(idx) {
    if (cellStates[idx] === 'revealed' || ticketRevealed) return;

    const canvas = cellCanvases[idx];
    const ctx = cellCtxs[idx];
    const w = canvas.width;
    const h = canvas.height;
    const sampleSize = 20;
    let transparent = 0;
    const total = sampleSize * sampleSize;

    const imageData = ctx.getImageData(0, 0, w, h);
    const data = imageData.data;
    const stepX = Math.floor(w / sampleSize);
    const stepY = Math.floor(h / sampleSize);

    for (let i = 0; i < sampleSize; i++) {
      for (let j = 0; j < sampleSize; j++) {
        const px = i * stepX;
        const py = j * stepY;
        const di = (py * w + px) * 4;
        if (data[di + 3] < 128) transparent++;
      }
    }

    if (transparent / total >= CELL_SCRATCH_THRESHOLD) {
      revealCell(idx);
    }
  }

  // =============================================
  // REVEAL SINGLE CELL
  // =============================================
  function revealCell(idx) {
    if (cellStates[idx] === 'revealed') return;
    cellStates[idx] = 'revealed';

    const cell = cellGrid.children[idx];
    cell.classList.add('state-revealed');

    // Check if this was a reward cell
    const attempt = ATTEMPTS[currentAttempt];
    if (attempt.rewardCells.includes(idx)) {
      revealedRewardCount++;
    }

    // Check if enough reward cells opened to auto-complete
    const neededRewards = Math.min(CELLS_TO_AUTO_REVEAL, attempt.rewardCells.length);
    if (revealedRewardCount >= neededRewards && !ticketRevealed) {
      autoCompleteTicket();
    }
  }

  // =============================================
  // AUTO-COMPLETE TICKET
  // =============================================
  function autoCompleteTicket() {
    if (ticketRevealed) return;
    ticketRevealed = true;
    state = `reveal_${currentAttempt + 1}`;

    // Reveal all remaining cells with stagger
    const unrevealed = [];
    for (let i = 0; i < 9; i++) {
      if (cellStates[i] !== 'revealed') unrevealed.push(i);
    }

    unrevealed.forEach((idx, order) => {
      setTimeout(() => {
        cellStates[idx] = 'revealed';
        const cell = cellGrid.children[idx];
        cell.classList.add('state-revealed');
      }, order * 120);
    });

    // After stagger animation, show result
    const staggerDone = unrevealed.length * 120 + 300;
    setTimeout(() => showAttemptResult(), staggerDone);
  }

  // =============================================
  // SHOW ATTEMPT RESULT
  // =============================================
  function showAttemptResult() {
    const attempt = ATTEMPTS[currentAttempt];

    attemptResultImg.src = attempt.rewardImg;
    attemptResultText.textContent = attempt.resultText;
    attemptResultSub.textContent = attempt.resultSub;
    attemptResult.classList.add('visible');

    if (attempt.isFinal) {
      setTimeout(() => {
        state = 'final_offer_reveal';
        showFinalScreen();
      }, REVEAL_HOLD_MS);
    } else {
      setTimeout(() => {
        attemptResult.classList.remove('visible');
        ticket.classList.add('exiting');
        setTimeout(() => {
          setupAttempt(currentAttempt + 1);
        }, TRANSITION_MS);
      }, REVEAL_HOLD_MS);
    }
  }

  // =============================================
  // FINAL SCREEN (reused from MVP)
  // =============================================
  function showFinalScreen() {
    finalScreen.classList.add('visible');
    state = 'final_offer_hold';
    launchConfetti();

    document.getElementById('ctaBtn').addEventListener('click', () => {
      alert('Переход к регистрации');
    });
  }

  // =============================================
  // CONFETTI (reused from MVP)
  // =============================================
  function launchConfetti() {
    const colors = ['#ffd700', '#ff6b00', '#ff9500', '#fff', '#ff4444', '#44ff44', '#4488ff'];
    for (let i = 0; i < 60; i++) {
      const el = document.createElement('div');
      el.className = 'confetti-piece';
      el.style.left = Math.random() * 100 + '%';
      el.style.background = colors[Math.floor(Math.random() * colors.length)];
      el.style.borderRadius = Math.random() > 0.5 ? '50%' : '2px';
      el.style.width = (Math.random() * 8 + 6) + 'px';
      el.style.height = (Math.random() * 8 + 6) + 'px';

      const duration = Math.random() * 2 + 2;
      const delay = Math.random() * 0.8;
      const xDrift = (Math.random() - 0.5) * 200;
      el.style.animation = `confetti-fall ${duration}s ${delay}s ease-out forwards`;
      el.style.setProperty('--x-drift', xDrift + 'px');

      confettiContainer.appendChild(el);
    }

    if (!document.getElementById('confettiStyle')) {
      const style = document.createElement('style');
      style.id = 'confettiStyle';
      style.textContent = `
        @keyframes confetti-fall {
          0% { opacity: 1; transform: translateY(0) translateX(0) rotate(0deg); }
          100% { opacity: 0; transform: translateY(100vh) translateX(var(--x-drift)) rotate(720deg); }
        }
      `;
      document.head.appendChild(style);
    }
  }

  // =============================================
  // SPARKLE (reused from MVP)
  // =============================================
  function spawnSparkle(clientX, clientY) {
    const el = document.createElement('div');
    el.className = 'sparkle';
    el.style.left = (clientX + (Math.random() - 0.5) * 16) + 'px';
    el.style.top = (clientY + (Math.random() - 0.5) * 16) + 'px';
    document.body.appendChild(el);
    setTimeout(() => el.remove(), 1200);
  }

  // =============================================
  // GO
  // =============================================
  init();
})();
</script>
</body>
